name: Deploy (Docker Compose)

on:
  workflow_call:
    inputs:
      runner_label:
        description: "Label do runner self-hosted onde o deploy deve rodar (ex.: soxmanager-borborema)"
        required: true
        type: string
      service:
        description: "Nome do servico no docker-compose.yml a ser construido/atualizado"
        required: true
        type: string
      compose_file:
        description: "Caminho do arquivo compose, relativo a raiz do repo"
        required: false
        type: string
        default: "docker-compose.yml"
      working_directory:
        description: "Diretorio de trabalho dentro do repo onde o compose deve ser executado"
        required: false
        type: string
        default: "."
      host_dirs:
        description: >
          Caminhos absolutos no host (um por linha) que precisam existir.
        required: false
        type: string
        default: ""
      host_dirs_owner:
        description: "uid:gid a aplicar nos host_dirs"
        required: false
        type: string
        default: "1000:1000"
      environment:
        description: >
          Nome do GitHub Environment (dev/hml/prd) pra aplicar nesse deploy
        required: true
        type: string
      push_to_registry:
        description: >
          Publica a imagem no GHCR depois do build, com tag semver
        required: false
        type: string
        default: "true"
      version:
        description: >
          Versao semver core da app sendo deployada (ex.: 0.6.16)
        required: true
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-${{ inputs.service }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ${{ inputs.runner_label }}
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Criar diretorios no host
        if: ${{ inputs.host_dirs != '' }}
        run: |
          printf '%s\n' "${{ inputs.host_dirs }}" | while IFS= read -r dir; do
            [ -z "$dir" ] && continue
            echo "[i] checando $dir"
            docker run --rm -v /:/hostroot alpine sh -c \
              "[ -d /hostroot$dir ] || (mkdir -p /hostroot$dir && chown -R ${{ inputs.host_dirs_owner }} /hostroot$dir && echo '[i] criado e chown aplicado em $dir')"
          done

      - name: Calcula tag da imagem (semver)
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REMOTE_IMAGE="ghcr.io/$OWNER_LC/${{ inputs.service }}"
          SHA_SHORT="${GITHUB_SHA:0:7}"
          VERSION="${{ inputs.version }}"
          ENVIRONMENT="${{ inputs.environment }}"
          case "$ENVIRONMENT" in
            prd) TAG="$VERSION" ;;
            hml) TAG="$VERSION-rc.$SHA_SHORT" ;;
            dev) TAG="$VERSION-dev.$SHA_SHORT" ;;
            *) TAG="$VERSION-$ENVIRONMENT.$SHA_SHORT" ;;
          esac
          echo "REMOTE_IMAGE=$REMOTE_IMAGE" >> "$GITHUB_ENV"
          echo "APP_IMAGE=$REMOTE_IMAGE:$TAG" >> "$GITHUB_ENV"
          echo "[i] imagem desta execucao: $REMOTE_IMAGE:$TAG"

      - name: Build da imagem (${{ inputs.service }})
        run: docker compose -f "${{ inputs.compose_file }}" build "${{ inputs.service }}"

      - name: Login no GHCR
        if: ${{ inputs.push_to_registry == 'true' }}
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Publica imagem no GHCR
        if: ${{ inputs.push_to_registry == 'true' }}
        run: |
          docker push "$APP_IMAGE"
          echo "[i] publicado $APP_IMAGE"
          if [ "${{ inputs.environment }}" = "prd" ]; then
            docker tag "$APP_IMAGE" "$REMOTE_IMAGE:latest"
            docker push "$REMOTE_IMAGE:latest"
            echo "[i] publicado $REMOTE_IMAGE:latest"
          fi

      - name: Atualiza o container (${{ inputs.service }})
        run: docker compose -f "${{ inputs.compose_file }}" up -d "${{ inputs.service }}"

      - name: Limpeza de imagens antigas
        if: always()
        run: docker image prune -f
